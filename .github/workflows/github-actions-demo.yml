name: GitHub Actions Demo
on:
  push:
    branches: [ main ]
    paths-ignore: [ .github/** ]
  pull_request: 
    branches: [ main ]
  schedule:
    - cron: '15 6 * * 0'
  workflow_dispatch: 
    inputs:
      environment:
        description: 'Environment to deploy to'
        type: environment
        required: true


jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Event that triggers the workflow
        run: |
          echo "event: ${{ github.event_name }}"
          echo "branch ${{ github.ref }}"
          
      - name: Checkout
        uses: actions/checkout@v3.3.0
        
      - name: List files in the repository
        run: |
          echo "repository: ${{ github.repository }} contains files:"
          tree
