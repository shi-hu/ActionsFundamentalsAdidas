name: GitHub Actions Demo
on:
  push:
    branches: [ main ]
    paths-ignore: [ .github/** ]
  pull_request: 
    branches: [ main ]
  schedule:
    - cron: '15 6 * * 0'
  workflow_dispatch: 
    inputs:
      environment:
        description: 'Environment to deploy to'
        type: environment
        required: true


jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Event that triggers the workflow
        run: |
          echo "event: ${{ github.event_name }}"
          echo "branch ${{ github.ref }}"
          
      - name: Checkout
        uses: actions/checkout@v3.3.0
        
      - name: List files in the repository
        run: |
          echo "repository: ${{ github.repository }} contains files:"
          tree
  Test:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: Build
    environment: Test
    steps:
      - name: Writes to Test environment
        run: echo "Testing..."

  Load-Test:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: Build
    environment: Load-Test
    steps:
      - name: Writes to Load-Test environment
        run: echo "Testing..."

  Production:
    runs-on: ubuntu-latest
    needs: [Test, Load-Test]
    environment: 
      name: Production
      url: https://writeabout.net
    if: github.event.inputs.environment == 'Production'
    steps:
      - name: Step 1
        run: |
          echo "Step 1"
          sleep 10
      - name: Step 2
        run: |
          echo "Step 2"
          sleep 10
      - name: Step 3
        run: |
          echo "Step 3"
          sleep 10
      - name: Step 4
        run: |
          echo "Step 4"
          sleep 10
      - name: Step 5
        run: |
          echo "Step 5"
          sleep 10
